version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - mkdir -p package
      - pip install -r lambda/requirements.txt -t package

  build:
    commands:
      - cp lambda/*.py package/
      - echo "Build completed successfully"

artifacts:
  base-directory: package
  files:
    - '**/*'