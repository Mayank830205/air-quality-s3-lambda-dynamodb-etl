version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip

  pre_build:
    commands:
      - python -m compileall lambda
      - python -m compileall scripts

  build:
    commands:
      - python scripts/build_lambda_package.py --install-deps

artifacts:
  files:
    - lambda_deployment_package.zip
