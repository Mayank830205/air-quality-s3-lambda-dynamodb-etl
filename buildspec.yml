version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.12
    commands:
      - python -m pip install --upgrade pip
      - rm -rf package lambda_deployment_package.zip
      - mkdir -p package
      - if [ -s lambda/requirements.txt ]; then pip install -r lambda/requirements.txt -t package; fi

  pre_build:
    commands:
      - python -m compileall lambda

  build:
    commands:
      - cp lambda/*.py package/
      - cd package && zip -r ../lambda_deployment_package.zip .

artifacts:
  files:
    - lambda_deployment_package.zip
